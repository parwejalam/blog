<a class="skip-link" href="#main">Skip to content</a>
<header class="site-header">
  <nav>
    <a class="brand" routerLink="/">parwej<span>.dev</span></a>
    <div class="nav-links">
      <a class="link" href="https://parwejalam.github.io/">Portfolio</a>
      <button
        type="button"
        class="theme-toggle"
        (click)="theme.toggle()"
        [attr.aria-label]="theme.theme() === 'dark' ? 'Switch to light theme' : 'Switch to dark theme'"
        title="Toggle theme"
      >
        {{ theme.theme() === 'dark' ? '☀️' : '🌙' }}
      </button>
    </div>
  </nav>
</header>

<main id="main" class="site-main">
  <router-outlet />
</main>

<footer class="site-footer">
  <p>© Parwej Alam · Built with Angular, prerendered on GitHub Pages</p>
</footer>
